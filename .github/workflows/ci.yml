name: FormatShield CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy python-dotenv pytest

      - name: Run unit tests
        run: |
          python tests/test_detector.py

      - name: Verify package import
        run: |
          python -c "from src.formatshield import FormatShieldDetector, DetectionResult; print('Import OK')"

      - name: Verify experiment imports
        run: |
          python -c "import experiments.exp2_vulnerability_heatmap; print('EXP-2 import OK')"
